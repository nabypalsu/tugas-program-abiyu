<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perhitungan Bonus Pembelian Abiyu</title>
    <link rel="stylesheet" href="Abiyucss.css" />
  </head>
  <body>
    <div class="container">
      <h2>Kalkulator Bonus Pembelian</h2>

      <form id="formBelanja">
        <div class="form-group">
          <label for="namaPelanggan">Nama Pelanggan:</label>
          <input type="text" id="namaPelanggan" placeholder="" />
        </div>
        <div class="form-group">
          <label for="namaProduk">Nama Produk:</label>
          <input type="text" id="namaProduk" placeholder="" />
        </div>
        <div class="form-group">
          <label for="hargaProduk">Harga Produk (Rp):</label>
          <input type="number" id="hargaProduk" placeholder="" min="0" />
        </div>
        <div class="form-group">
          <label for="jumlahBeli">Jumlah Pembelian:</label>
          <input type="number" id="jumlahBeli" placeholder="" min="1" />
        </div>

        <div class="button-group">
          <button type="button" class="btn-hitung" onclick="hitungTransaksi()">
            Hitung
          </button>
          <button type="reset" class="btn-reset" onclick="resetForm()">
            Reset
          </button>
        </div>
      </form>

      <div id="cardHasil" class="card-hasil">
        <h3>Detail Transaksi</h3>
        <div class="hasil-item">
          <span>Nama Pelanggan:</span>
          <span id="outNama">-</span>
        </div>
        <div class="hasil-item">
          <span>Nama Produk:</span>
          <span id="outProduk">-</span>
        </div>
        <div class="hasil-item">
          <span>Total Belanja:</span>
          <span id="outTotalBelanja">-</span>
        </div>
        <div class="hasil-item">
          <span>Potongan:</span>
          <span id="outPotongan">-</span>
        </div>
        <div class="hasil-item total">
          <span>Total Bayar:</span>
          <span id="outTotalBayar">-</span>
        </div>
      </div>
    </div>

    <script src="Abiyujs.js"></script>
  </body>
</html>
